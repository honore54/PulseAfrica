name: PulseAfrica Auto Publish

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 8 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate all 6 categories
        run: |
          BASE="https://pulse-africa.vercel.app/api/cron"
          AUTH="Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          CATS=("politics" "sports" "entertainment" "africa" "technology" "business")
          SUCCESS=0
          FAILED=0

          echo "🚀 PulseAfrica Session — $(date -u)"
          echo "=================================="

          for CAT in "${CATS[@]}"; do
            echo ""
            echo "→ Generating: $CAT"

            # Use || true so timeout never kills the whole job
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "$AUTH" \
              --max-time 90 \
              --connect-timeout 10 \
              "$BASE?cat=$CAT" 2>/dev/null) || RESPONSE="timeout\n000"

            HTTP=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            if echo "$BODY" | grep -q '"success":true'; then
              TITLE=$(echo "$BODY" | grep -o '"title":"[^"]*"' | cut -d'"' -f4)
              echo "✅ $CAT: $TITLE"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "⚠️ $CAT failed (HTTP: $HTTP) — continuing..."
              FAILED=$((FAILED + 1))
            fi

            if [ "$CAT" != "business" ]; then
              sleep 10
            fi
          done

          echo ""
          echo "=================================="
          echo "✅ Generated: $SUCCESS/6"
          echo "❌ Failed: $FAILED/6"
          echo "=================================="

          # Always exit 0 — partial success is still success
          exit 0
