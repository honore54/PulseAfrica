name: PulseAfrica Auto Publish

on:
  schedule:
    - cron: '0 22 * * *'   # Midnight CAT
    - cron: '0 8 * * *'    # 10 AM CAT
    - cron: '0 16 * * *'   # 6 PM CAT
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate all 6 articles
        run: |
          echo "Starting PulseAfrica session: $(date -u)"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 540 \
            --connect-timeout 30 \
            "https://pulse-africa.vercel.app/api/cron")

          HTTP=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP"
          echo "Response: $BODY"

          if echo "$BODY" | grep -q '"success":true'; then
            echo "✅ Session complete!"
          else
            echo "⚠️ Session had issues"
          fi
